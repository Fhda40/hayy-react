name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --project fbrg87 --token "${{ secrets.FIREBASE_TOKEN }}"
        working-directory: functions

      - name: Deploy Firestore Rules
        run: npx firebase-tools deploy --only firestore:rules --project fbrg87 --token "${{ secrets.FIREBASE_TOKEN }}"
